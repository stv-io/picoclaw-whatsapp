name: PicoClaw WhatsApp

scms:
  default:
    kind: github
    spec:
      email: "updatecli-bot@users.noreply.github.com"
      owner: "stv-io"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      username: '{{ requiredEnv "GITHUB_USERNAME" }}'
      repository: "picoclaw-whatsapp"
      branch: "main"

sources:
  picoclaw:
    name: Get latest PicoClaw version from GitHub releases
    kind: githubrelease
    spec:
      owner: "sipeed"
      repository: "picoclaw"
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
    transformers:
      - trimprefix: "v"

targets:
  dockerfile-picoclaw-version:
    name: Update PicoClaw version in Dockerfile
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: Dockerfile
      matchpattern: 'git checkout v[0-9.]*'
      replacepattern: 'git checkout v{{ source "picoclaw" }}'

  dockerfile-picoclaw-version-native:
    name: Update PicoClaw version in Dockerfile.native
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: Dockerfile.native
      matchpattern: 'git checkout v[0-9.]*'
      replacepattern: 'git checkout v{{ source "picoclaw" }}'

  dockerfile-build-version:
    name: Update build version in Dockerfile
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: Dockerfile
      matchpattern: 'v[0-9.]*-whatsapp\.[0-9.]*'
      replacepattern: 'v{{ source "picoclaw" }}-whatsapp.1.0'

  dockerfile-build-version-native:
    name: Update build version in Dockerfile.native
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: Dockerfile.native
      matchpattern: 'v[0-9.]*-whatsapp\.[0-9.]*'
      replacepattern: 'v{{ source "picoclaw" }}-whatsapp.1.0'

  makefile-picoclaw-version:
    name: Update PicoClaw version in Makefile
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: Makefile
      matchpattern: 'PICOCLAW_VERSION \?= v[0-9.]*'
      replacepattern: 'PICOCLAW_VERSION ?= v{{ source "picoclaw" }}'

  readme-docker-pull-multi-arch:
    name: Update Docker pull command in README (multi-arch)
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: README.md
      matchpattern: 'docker pull ghcr.io/stv-io/picoclaw-whatsapp:v[0-9.]*-whatsapp\.[0-9.]*'
      replacepattern: 'docker pull ghcr.io/stv-io/picoclaw-whatsapp:v{{ source "picoclaw" }}-whatsapp.1.0'

  readme-docker-pull-native:
    name: Update Docker pull command in README (native)
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: README.md
      matchpattern: 'docker pull ghcr.io/stv-io/picoclaw-whatsapp:v[0-9.]*-whatsapp\.[0-9.]*-native'
      replacepattern: 'docker pull ghcr.io/stv-io/picoclaw-whatsapp:v{{ source "picoclaw" }}-whatsapp.1.0-native'

  readme-kubernetes-multi-arch:
    name: Update Kubernetes deployment image in README (multi-arch)
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: README.md
      matchpattern: 'image: ghcr.io/stv-io/picoclaw-whatsapp:v[0-9.]*-whatsapp\.[0-9.]*'
      replacepattern: 'image: ghcr.io/stv-io/picoclaw-whatsapp:v{{ source "picoclaw" }}-whatsapp.1.0'

  readme-kubernetes-native:
    name: Update Kubernetes deployment image in README (native)
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: README.md
      matchpattern: 'image: ghcr.io/stv-io/picoclaw-whatsapp:v[0-9.]*-whatsapp\.[0-9.]*-native'
      replacepattern: 'image: ghcr.io/stv-io/picoclaw-whatsapp:v{{ source "picoclaw" }}-whatsapp.1.0-native'

  readme-image-tags-multi-arch:
    name: Update image tags section in README (multi-arch)
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: README.md
      matchpattern: '- `v[0-9.]*-whatsapp\.[0-9.]*` - Versioned release \(multi-arch\) \*\*PRIMARY\*\*'
      replacepattern: '- `v{{ source "picoclaw" }}-whatsapp.1.0` - Versioned release (multi-arch) **PRIMARY**'

  readme-image-tags-native:
    name: Update image tags section in README (native)
    kind: file
    sourceid: picoclaw
    scmid: default
    spec:
      file: README.md
      matchpattern: '- `v[0-9.]*-whatsapp\.[0-9.]*-native` - Versioned release \(native, single arch\)'
      replacepattern: '- `v{{ source "picoclaw" }}-whatsapp.1.0-native` - Versioned release (native, single arch)'

actions:
  default:
    kind: "github/pullrequest"
    scmid: default
    spec:
      title: "chore: Update PicoClaw to v{{ source "picoclaw" }}"
      description: |
        This PR was automatically generated by updatecli.

        It updates PicoClaw to version v{{ source "picoclaw" }}.

        ### Changes:
        - Updated PicoClaw version in Dockerfile and Dockerfile.native
        - Updated build version strings
        - Updated Makefile version variable
        - Updated GitHub Actions workflow
        - Updated README documentation

        ### Verification:
        - [ ] Test local builds: `make build-local` and `make build-native`
        - [ ] Test multi-arch build: `make build-multi-arch`
        - [ ] Verify container starts correctly
      mergemethod: "squash"
      labels:
        - "dependencies"
        - "picoclaw-update"
